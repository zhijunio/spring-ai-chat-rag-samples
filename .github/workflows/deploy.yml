name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from pom.xml
        id: version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: get-version
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      - name: Build Docker image
        run: docker build -t spring-ai-chat-rag-samples:${{ needs.get-version.outputs.version }} .

      - name: Deploy to ${{ github.event.inputs.environment }}
        run: |
          echo "Deploying version ${{ needs.get-version.outputs.version }} to ${{ github.event.inputs.environment }}"
          # Add your deployment command here (kubectl, docker-compose, cloud CLI, etc.)
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

  health-check:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for application to start
        run: sleep 60

      - name: Health check
        run: |
          curl -f ${{ vars.APP_URL }}/actuator/health || exit 1

  rollback:
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy, health-check]

    steps:
      - name: Rollback deployment
        run: |
          echo "Rolling back deployment..."
          # Add your rollback command here
