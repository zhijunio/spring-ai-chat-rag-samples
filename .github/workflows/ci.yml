name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B compile --file pom.xml
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run tests
        run: mvn -B test --file pom.xml
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Cache OWASP dependency check database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-owasp-

      - name: Security audit
        run: mvn -B org.owasp:dependency-check-maven:check --file pom.xml
        continue-on-error: true
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Get version from pom.xml
        id: version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Build JAR
        run: mvn -B package -DskipTests --file pom.xml

      - name: Build Docker image with version tag
        run: docker build -t spring-ai-chat-rag-samples:${{ steps.version.outputs.version }} .

      - name: Tag Docker image with commit SHA
        run: docker tag spring-ai-chat-rag-samples:${{ steps.version.outputs.version }} spring-ai-chat-rag-samples:${{ github.sha }}
